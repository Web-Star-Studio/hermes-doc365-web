# Doc365 Hermes Portal — CI
#
# What runs here is intentionally small and fast:
#   - web: install + typecheck + lint + next build
#   - adapter: ruff + pytest
#
# Docker image builds, Playwright e2e, and container security scans are
# deliberately out of scope until the MVP hardens.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # Build needs env vars for Next.js to not blow up on missing secrets.
      # Use deterministic placeholders — they're only parsed, not used.
      - name: next build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET || 'ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci' }}
          ADAPTER_URL: http://localhost:8000
          ADAPTER_HMAC_SECRET: ci-hmac-secret
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: ci
          S3_SECRET_KEY: ci
          S3_BUCKET: ci
          ORIZON_SUBMIT_ENABLED: "false"
        run: pnpm build

  adapter:
    name: adapter — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install "uv>=0.5.0"
      - name: Install adapter
        run: uv pip install --system ".[dev]"
      - run: ruff check src tests
      - name: pytest
        env:
          ADAPTER_HMAC_SECRET: ci-hmac-secret
        run: pytest -q
