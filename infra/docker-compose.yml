# Doc365 Hermes Portal — local dev stack
# Run from repo root:  docker compose -f infra/docker-compose.yml --env-file .env up -d

name: doc365-hermes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/00-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the bucket on first run, then exits.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      mc anonymous set none local/${S3_BUCKET} &&
      echo 'Bucket ${S3_BUCKET} ready' &&
      exit 0
      "

  adapter:
    build:
      context: ../adapter
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      ADAPTER_HMAC_SECRET: ${ADAPTER_HMAC_SECRET}
      HERMES_MODEL_PROVIDER: ${HERMES_MODEL_PROVIDER}
      HERMES_API_KEY: ${HERMES_API_KEY}
      HERMES_MODEL: ${HERMES_MODEL}
      HERMES_HOME: ${HERMES_HOME}
      ORIZON_SUBMIT_ENABLED: ${ORIZON_SUBMIT_ENABLED}
      ADAPTER_MAX_FILE_BYTES: ${ADAPTER_MAX_FILE_BYTES}
      ADAPTER_MAX_REQUEST_BYTES: ${ADAPTER_MAX_REQUEST_BYTES}
      ADAPTER_HISTORY_TURNS: ${ADAPTER_HISTORY_TURNS}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - hermesdata:/hermes-data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      adapter:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      ADAPTER_URL: ${ADAPTER_URL}
      ADAPTER_HMAC_SECRET: ${ADAPTER_HMAC_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL}
      S3_ENDPOINT_PUBLIC: ${S3_ENDPOINT_PUBLIC}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      ORIZON_SUBMIT_ENABLED: ${ORIZON_SUBMIT_ENABLED}
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - adapter
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  miniodata:
  hermesdata:
  caddydata:
  caddyconfig:
